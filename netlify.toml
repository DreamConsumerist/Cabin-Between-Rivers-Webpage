# Netlify configuration — see https://docs.netlify.com/build/configure-builds/file-based-configuration/
# NOTE: never put secrets here (this file is committed to git). Secrets go in the
# Netlify UI/CLI with the "Functions" scope. See SETUP.md.

[build]
  command = "pnpm build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# `netlify dev` runs Vite + Functions together on http://localhost:8888
[dev]
  framework = "vite"
  targetPort = 5173
  port = 8888

# Friendly API paths: /api/health -> /.netlify/functions/health
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200
  force = true

# SPA fallback: this is a client-side-routed app (TanStack Router), so any path
# without a matching static file (a direct load/refresh/bookmark of /about,
# /admin, /booking, etc. — not a client-side navigation) must still serve
# index.html and let the router take over, rather than 404. Netlify only
# applies this when no real static file matches the path, so actual assets
# (JS/CSS/images) are unaffected. Must stay after the /api/* rule above so API
# calls aren't caught by this catch-all first.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
